---
services:
  rustume:
    image: ghcr.io/lgtm-hq/rustume:latest
    container_name: rustume
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: info
      PORT: "3000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/rustume-server", "--health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
