---
name: Post PR Comment
description: Post or update a comment on a PR with marker-based deduplication

inputs:
  github-token:
    description: GitHub token for API access
    required: true
  marker:
    description: Unique marker to identify and update existing comments
    required: true
  body:
    description: Comment body content (markdown) - mutually exclusive with file
    required: false
  file:
    description: Path to file containing comment body - mutually exclusive with body
    required: false
  pr-number:
    description: PR number (defaults to current PR)
    required: false

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_BODY: ${{ inputs.body }}
        INPUT_FILE: ${{ inputs.file }}
      run: ./scripts/ci/github/post-pr-comment-validate.sh

    - name: Read comment from file
      if: inputs.file != ''
      id: read-file
      shell: bash
      env:
        INPUT_FILE: ${{ inputs.file }}
      run: ./scripts/ci/github/post-pr-comment-read-file.sh

    - name: Post or update PR comment
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        COMMENT_BODY:
          ${{ inputs.file != '' && steps.read-file.outputs.content || inputs.body }}
        COMMENT_MARKER: ${{ inputs.marker }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const marker = `<!-- ${process.env.COMMENT_MARKER} -->`;
          const body = `${marker}\n${process.env.COMMENT_BODY}`;

          const inputPr = process.env.INPUT_PR_NUMBER;
          const prNumber = inputPr ? parseInt(inputPr, 10) : context.issue.number;

          if (!prNumber) {
            console.log('No PR number found, skipping comment');
            return;
          }

          const comments = await github.paginate(
            github.rest.issues.listComments,
            {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            }
          );

          const existingComment = comments.find(comment =>
            comment.body && comment.body.includes(marker)
          );

          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: body,
            });
            console.log(`Updated comment ${existingComment.id}`);
          } else {
            const { data: newComment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });
            console.log(`Created comment ${newComment.id}`);
          }
