# SPDX-License-Identifier: MIT
---
name: Test & Coverage

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/test-ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-build:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-rust.yml@eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
    with:
      tooling-ref: eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
      run-build: true
      run-coverage: false
      job-name-build: "🔨 Build Check"
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        static.rust-lang.org:443
        sh.rustup.rs:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
    permissions:
      contents: read

  rust-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-rust.yml@eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
    with:
      tooling-ref: eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
      run-build: false
      run-coverage: true
      job-name-coverage: "🦀 Rust Coverage"
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        static.rust-lang.org:443
        sh.rustup.rs:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
    permissions:
      contents: read
      pull-requests: write

  web-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-node.yml@eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
    with:
      tooling-ref: eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
      job-name: "🌐 Web Coverage"
      working-directory: apps/web
      package-manager: bun
      node-version: "20"
      coverage: true
      test-command: bun run test:coverage
      coverage-pr-comment: true
      coverage-comment-marker: web-coverage-report
      coverage-comment-title: Web Coverage Report
      draft-pr-skip: true
    permissions:
      contents: read
      pull-requests: write
