# SPDX-License-Identifier: MIT
---
name: Test & Coverage

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/test-ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-build:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-rust.yml@07686fcab641d2c7385b5fa8e718af1cd1c55594
    with:
      tooling-ref: "375d104f6ca707f4f35344170a42bf901a617a9f"
      run-build: true
      run-coverage: false
      job-name-build: "🔨 Build Check"
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        static.rust-lang.org:443
        sh.rustup.rs:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
    permissions:
      contents: read
      # Reusable workflow defines coverage-pr-comment with pull-requests: write;
      # GitHub validates nested job permissions even when run-coverage is false.
      pull-requests: write

  rust-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-rust.yml@07686fcab641d2c7385b5fa8e718af1cd1c55594
    with:
      tooling-ref: "375d104f6ca707f4f35344170a42bf901a617a9f"
      run-build: false
      run-coverage: true
      job-name-coverage: "🦀 Rust Coverage"
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        static.rust-lang.org:443
        sh.rustup.rs:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
    permissions:
      contents: read
      pull-requests: write

  # reusable-test-node @ v0.15.0 hardcodes harden-runner egress-policy: audit and
  # does not expose egress-policy / allowed-endpoints workflow_call inputs (unlike
  # reusable-test-rust). Accepted until lgtm-ci adds those inputs; rust jobs above
  # use egress-policy: block with an explicit endpoint allowlist.
  web-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-node.yml@375d104f6ca707f4f35344170a42bf901a617a9f # v0.15.0
    with:
      tooling-ref: "375d104f6ca707f4f35344170a42bf901a617a9f"
      job-name: "🌐 Web Coverage"
      working-directory: apps/web
      package-manager: bun
      node-version: "20"
      coverage: true
      test-command: bun run test:coverage
      coverage-pr-comment: true
      coverage-comment-marker: web-coverage-report
      coverage-comment-title: Web Coverage Report
      draft-pr-skip: true
      publish-results: false
    permissions:
      contents: write
      pages: write
      pull-requests: write
