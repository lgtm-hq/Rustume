# SPDX-License-Identifier: MIT
---
name: Test & Coverage

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/test-ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-build:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-rust.yml@232624c406e8c44bdcaa67f0d7da84f19d85e253
    with:
      tooling-ref: "375d104f6ca707f4f35344170a42bf901a617a9f"
      run-build: true
      run-coverage: false
      job-name-build: "🔨 Build Check"
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        static.rust-lang.org:443
        sh.rustup.rs:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
    permissions:
      contents: read
      # Reusable workflow defines coverage-pr-comment with pull-requests: write;
      # GitHub validates nested job permissions even when run-coverage is false.
      pull-requests: write

  rust-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-rust.yml@232624c406e8c44bdcaa67f0d7da84f19d85e253
    with:
      tooling-ref: "375d104f6ca707f4f35344170a42bf901a617a9f"
      run-build: false
      run-coverage: true
      job-name-coverage: "🦀 Rust Coverage"
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        static.rust-lang.org:443
        sh.rustup.rs:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
    permissions:
      contents: read
      pull-requests: write

  web-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-node.yml@5282c1d080324874705496bd6af5f11b4acb49ef # v0.17.0
    with:
      tooling-ref: "5282c1d080324874705496bd6af5f11b4acb49ef"
      job-name: "🌐 Web Coverage"
      working-directory: apps/web
      package-manager: bun
      node-version: "20"
      coverage: true
      coverage-format: json
      coverage-pr-comment: true
      coverage-comment-marker: web-coverage-report
      coverage-comment-title: Web Coverage Report
      draft-pr-skip: true
      publish-results: false
      egress-policy: audit
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        registry.npmjs.org:443
    permissions:
      contents: read
      pull-requests: write
