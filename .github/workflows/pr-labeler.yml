# SPDX-License-Identifier: MIT
---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@69d5990a1d877f752ecd47bd961851b5f6feea36 # v0.32.4
    with:
      job-name: "🏷️ Auto Label PR"
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '69d5990a1d877f752ecd47bd961851b5f6feea36' # v0.32.4
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
