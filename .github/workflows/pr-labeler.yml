# SPDX-License-Identifier: AGPL-3.0-only
---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    with:
      job-name: "🏷️ Auto Label PR"
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
