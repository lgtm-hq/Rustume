# SPDX-License-Identifier: MIT
---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.
# Uses lgtm-ci harden-runner action.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: 🏷️ Auto Label PR
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@58be2e8b58936973af5da34f19f5fea7336ba1e5 # v0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443

      - name: Apply labels based on changed files
        # yamllint disable-line rule:line-length
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false
