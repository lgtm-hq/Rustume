# SPDX-License-Identifier: MIT
---
name: PR - Auto Label
# Automatically applies labels to pull requests based on changed files.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
    with:
      job-name: "🏷️ Auto Label PR"
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e' # v0.33.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
