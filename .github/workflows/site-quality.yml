# SPDX-License-Identifier: AGPL-3.0-only
---
name: Quality - Documentation Site

"on":
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'docs/**'
      - 'scripts/ci/site/**'
      - 'tests/scripts/ci/**'
      - 'pyproject.toml'
      - '.github/workflows/site-quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'docs/**'
      - 'scripts/ci/site/**'
      - 'tests/scripts/ci/**'
      - 'pyproject.toml'
      - '.github/workflows/site-quality.yml'

permissions: {}

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  site-quality:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-site-quality.yml@cecca744299be6a34f3b4ea4f18c00262081ab61 # v0.41.0
    permissions:
      contents: read
    with:
      tooling-ref: 'cecca744299be6a34f3b4ea4f18c00262081ab61' # v0.41.0
      job-name: Build and check documentation site
      test-job-name: Test documentation site
      node-version: '22'
      package-manager: bun
      site-working-directory: apps/site
      cache-dependency-path: apps/site/bun.lock
      build-command: ./scripts/ci/site/build.sh
      build-env: |
        ASTRO_BASE=/
      check-command: ./scripts/ci/site/check.sh
      test-command: ./scripts/ci/site/test-all.sh
      python-version: '3.12'
      lychee-paths: apps/site/dist
      lychee-file-extensions: html
      lychee-root-dir: apps/site/dist
      upload-site-artifact: true
      site-artifact-name: site-dist
      site-artifact-path: apps/site/dist
      runner-image: ubuntu-24.04
      egress-policy: block
      egress-preset: github-pages
      test-allowed-endpoints: |
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        raw.githubusercontent.com:443
        registry.npmjs.org:443
        bun.sh:443
        pypi.org:443
        files.pythonhosted.org:443
