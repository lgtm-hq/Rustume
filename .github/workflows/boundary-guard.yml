# SPDX-License-Identifier: AGPL-3.0-only
---
name: Quality - Ops Boundary Guard

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: boundary-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundary:
    name: Ops boundary guard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
        with:
          persist-credentials: false

      - name: Path guard
        run: bash scripts/ci/boundary/check_paths.sh

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Content guard (semgrep)
        run: bash scripts/ci/boundary/check_content.sh
