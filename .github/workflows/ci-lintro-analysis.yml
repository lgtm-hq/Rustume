# SPDX-License-Identifier: MIT
---
name: Quality - Lint & Format
# Runs lintro quality analysis on PRs and pushes using Docker.
# Uses lgtm-ci actions for hardening and PR comments.

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.md"
      - "**.yml"
      - "**.yaml"
      - "**.toml"
      - "**.sh"
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile*"
      - ".github/workflows/**"
      - "scripts/**"
      - ".lintro-config.yaml"
      - ".lintro-ignore"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lintro-analysis:
    name: 🛠️ Lintro Code Quality & Analysis
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 30
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    defaults:
      run:
        shell: bash
    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@d4f6701dfe6c08c7c80f134aee084ed8debb489a # v0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            index.crates.io:443
            static.crates.io:443
            registry.npmjs.org:443
            semgrep.dev:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@d4f6701dfe6c08c7c80f134aee084ed8debb489a # v0
        with:
          fetch-depth: 0

      - name: Run Lintro Analysis
        id: lintro
        env:
          # yamllint disable-line rule:line-length
          LINTRO_IMAGE: ghcr.io/lgtm-hq/py-lintro:0.60.2@sha256:587283626d467b449922306e6a17d9386e96fd548e229fb003c155cc8878be44
          WORKSPACE: ${{ github.workspace }}
        run: ./scripts/ci/lintro/run-lintro-docker.sh

      - name: Generate PR Comment
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        run: ./scripts/ci/ci-pr-comment.sh

      - name: Comment PR with Lintro Results
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/post-pr-comment@d4f6701dfe6c08c7c80f134aee084ed8debb489a # v0
        with:
          file: pr-comment.txt
          marker: "<!-- lintro-report -->"

      - name: Fail on Linting Issues
        if: >-
          (success() || failure()) &&
          env.CHK_EXIT_CODE != '0'
        run: ./scripts/ci/fail-on-lint.sh
