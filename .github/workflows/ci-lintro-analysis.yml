# SPDX-License-Identifier: MIT
---
name: Quality - Lint & Format

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.md"
      - "**.yml"
      - "**.yaml"
      - "**.toml"
      - "**.sh"
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile*"
      - ".github/workflows/**"
      - "scripts/**"
      - ".lintro-config.yaml"
      - ".lintro-ignore"
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality.yml@eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
    with:
      tooling-ref: eb2ce465c93ca5408f6a659b19dbeebd1fb5df32
      job-name: "🛠️ Lintro Code Quality & Analysis"
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
        index.crates.io:443
        static.crates.io:443
        registry.npmjs.org:443
        semgrep.dev:443
    permissions:
      contents: read
      packages: read
      pull-requests: write
