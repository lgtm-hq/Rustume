# SPDX-License-Identifier: AGPL-3.0-only
---
name: Quality - Lint & Format
# Runs lintro quality analysis on PRs and pushes using Docker.

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.md"
      - "**.yml"
      - "**.yaml"
      - "**.toml"
      - "**.sh"
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.mjs"
      - "**.astro"
      - "**.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile*"
      - ".github/workflows/**"
      - "scripts/**"
      - ".lintro-config.yaml"
      - ".lintro-ignore"
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality-lint.yml@b620af6996fc59f8de7fba1d451f76c67d788339 # v0.41.0
    permissions:
      contents: read
      packages: read
    with:
      tooling-ref: 'b620af6996fc59f8de7fba1d451f76c67d788339' # v0.41.0
      job-name: "quality / 🛠️ Lintro Code Quality & Analysis"
      timeout-minutes: 30
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro:0.61.0@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      egress-policy: block
      egress-preset: quality

  publish-pr-comment:
    needs: quality
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.draft == false
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-quality-summary.yml@b620af6996fc59f8de7fba1d451f76c67d788339 # v0.41.0
    permissions:
      contents: read
      pull-requests: write
    with:
      exit-code: ${{ needs.quality.outputs.exit-code }}
      tooling-ref: 'b620af6996fc59f8de7fba1d451f76c67d788339' # v0.41.0
      job-name: "quality / 🛠️ Lintro Code Quality & Analysis PR Comment"
      egress-policy: block
