# SPDX-License-Identifier: AGPL-3.0-only
---
name: Test - Web E2E
# Runs the Playwright suites for the web app (apps/web/e2e): smoke, per-flow
# E2E (CRUD, templates, export, import, offline), visual regression, and
# accessibility. The run is self-contained: it builds the WASM module, builds
# the production bundle, and serves it via `vite preview` from the Playwright
# webServer block. Visual baselines live in apps/web/e2e/__screenshots__ and
# are generated on this runner (Linux) — on baseline changes, download the
# playwright-report artifact and commit the updated screenshots.

"on":
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'bindings/wasm/**'
      - 'crates/schema/**'
      - 'crates/parser/**'
      - 'crates/storage/**'
      - 'crates/utils/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/ci/testing/web/**'
      - '.github/workflows/test-e2e-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'bindings/wasm/**'
      - 'crates/schema/**'
      - 'crates/parser/**'
      - 'crates/storage/**'
      - 'crates/utils/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/ci/testing/web/**'
      - '.github/workflows/test-e2e-web.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-e2e-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-e2e:
    name: 🎭 Web E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    steps:
      - name: Harden Runner
        # Direct step-security invocation with an explicit allowlist: GitHub
        # + bun/npm (deps), Playwright CDNs + Ubuntu mirrors (chromium
        # --with-deps), and Rust endpoints (wasm32 target + crates for the
        # WASM build).
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pipelines.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            registry.npmjs.org:443
            nodejs.org:443
            bun.sh:443
            cdn.playwright.dev:443
            playwright.azureedge.net:443
            playwright-akamai.azureedge.net:443
            playwright-verizon.azureedge.net:443
            playwright.download.prss.microsoft.com:443
            storage.googleapis.com:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
            azure.archive.ubuntu.com:80
            esm.ubuntu.com:443
            packages.microsoft.com:443
            static.rust-lang.org:443
            crates.io:443
            index.crates.io:443
            static.crates.io:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0

      - name: Setup Rust (wasm32 target)
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/setup-rust@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node and bun
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/setup-node@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
        with:
          node-version: '22'
          working-directory: apps/web
          cache-dependency-path: apps/web/bun.lock
          install-dependencies: 'false'

      - name: Cache Playwright browsers
        # yamllint disable-line rule:line-length
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: Install wasm-pack
        run: ./scripts/ci/testing/web/install-wasm-pack.sh

      - name: Run Playwright suites
        run: ./scripts/ci/testing/web/e2e.sh

      - name: Upload Playwright report
        if: failure()
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
            apps/web/e2e/__screenshots__/
          retention-days: 7
          if-no-files-found: ignore
