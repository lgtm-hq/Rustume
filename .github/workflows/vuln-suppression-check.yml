# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - Vulnerability Suppression Check
# Weekly check for stale or expired vulnerability suppressions.
# Opens a cleanup PR when suppressions are no longer needed.

"on":
  schedule:
    # Weekly on Monday at 04:00 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: vuln-suppression-check-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-suppressions:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-vuln-suppression-check.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    with:
      job-name: "🔍 Check Vulnerability Suppressions"
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      workflow-file: vuln-suppression-check.yml
      runner-image: ubuntu-24.04
      egress-policy: block
      egress-preset: osv-scanner
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pull-requests: write
