# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - Dependency Review
# Reviews dependency changes in PRs for known security vulnerabilities.

"on":
  pull_request:

permissions: {}

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-dependency-review.yml@b620af6996fc59f8de7fba1d451f76c67d788339 # v0.41.0
    with:
      job-name: "🔍 Dependency Review"
      fail-on-severity: high
      tooling-ref: 'b620af6996fc59f8de7fba1d451f76c67d788339' # v0.41.0
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: append
      allowed-endpoints: |
        api.deps.dev:443
        api.securityscorecards.dev:443
    permissions:
      contents: read
      pull-requests: read
