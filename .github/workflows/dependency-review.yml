# SPDX-License-Identifier: MIT
---
name: Security - Dependency Review
# Reviews dependency changes in PRs for known security vulnerabilities.

"on":
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: 🔍 Dependency Review
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    concurrency:
      group: dependency-review-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@b822c8a67e26879ed229efa6e582a5665b4856b1 # v0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            api.deps.dev:443
            api.securityscorecards.dev:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@b822c8a67e26879ed229efa6e582a5665b4856b1 # v0

      - name: Dependency review
        # yamllint disable-line rule:line-length
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        # Allow failure on forks (no token) or when dependency graph is not enabled
        continue-on-error: true
        with:
          fail-on-severity: high
          # yamllint disable-line rule:line-length
          comment-summary-in-pr: >-
            ${{ github.event.pull_request.head.repo.fork == false }}
          allow-ghsas: true
