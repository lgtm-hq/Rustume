# SPDX-License-Identifier: MIT
---
name: Security - Dependency Review
# Reviews dependency changes in PRs for known security vulnerabilities.

"on":
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: 🔍 Dependency Review
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    concurrency:
      group: dependency-review-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@fc77ab6ea10f84236e4b897835665e8b0a57fe11 # v0.19.2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            api.deps.dev:443
            api.securityscorecards.dev:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@fc77ab6ea10f84236e4b897835665e8b0a57fe11 # v0.19.2

      - name: Dependency review
        # yamllint disable-line rule:line-length
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        # Allow failure on forks (no token) or when dependency graph is not enabled
        continue-on-error: true
        with:
          fail-on-severity: high
          # yamllint disable-line rule:line-length
          comment-summary-in-pr: >-
            ${{ github.event.pull_request.head.repo.fork == false }}
          allow-ghsas: true
          # Unknown-license warnings for Astro, @astrojs/sitemap, @lgtm-hq/turbo-themes,
          # and lgtm-ci composite actions reflect missing SPDX in GitHub's dependency
          # graph (npm/registry and action metadata still carry licenses). Not suppressible
          # via package.json; safe to ignore unless GitHub enriches the graph.
