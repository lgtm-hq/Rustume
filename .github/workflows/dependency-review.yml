# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - Dependency Review
# Reviews dependency changes in PRs for known security vulnerabilities.

"on":
  pull_request:

permissions: {}

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-dependency-review.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      job-name: "🔍 Dependency Review"
      fail-on-severity: high
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      egress-policy: block
      egress-preset: github-tooling
      # github-tooling preset + api.deps.dev: dependency-review-action
      # queries deps.dev for license/scorecard data when manifests change;
      # blocked egress surfaces as an immediate "fetch failed" (#439).
      allowed-endpoints: >-
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        uploads.github.com:443
        pipelines.actions.githubusercontent.com:443
        api.deps.dev:443
    permissions:
      contents: read
      pull-requests: read
