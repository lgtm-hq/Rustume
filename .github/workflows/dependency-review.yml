# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - Dependency Review
# Reviews dependency changes in PRs for known security vulnerabilities.

"on":
  pull_request:

permissions: {}

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-dependency-review.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    with:
      job-name: "🔍 Dependency Review"
      fail-on-severity: high
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: read
