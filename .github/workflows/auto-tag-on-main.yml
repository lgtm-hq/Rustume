# SPDX-License-Identifier: AGPL-3.0-only
---
name: Release - Auto Tag
# Automatically creates version tags when Cargo.toml version changes on main.

"on":
  push:
    branches: [main]
    paths:
      - Cargo.toml

permissions: {}

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-auto-tag.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      job-name: "🏷️ Create Release Tag"
      version-source: cargo
      create-release: false
      runner-image: ubuntu-24.04
      egress-policy: block
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    # Caller must grant permissions required by reusable-release-auto-tag, including
    # its report-release-failure follow-up job (lgtm-ci workflow-contract).
    permissions:
      actions: read # report-release-failure reads workflow/job metadata
      contents: write # create and push version tags
      issues: write # report-release-failure opens deduplicated failure issues
