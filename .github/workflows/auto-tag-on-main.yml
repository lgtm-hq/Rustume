---
name: Release - Auto Tag
# Automatically creates version tags when Cargo.toml version changes on main.

"on":
  push:
    branches: [main]
    paths:
      - Cargo.toml

permissions: {}

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-auto-tag.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    with:
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      job-name: "🏷️ Create Release Tag"
      version-source: cargo
      create-release: false
      runner-image: ubuntu-24.04
      egress-policy: block
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      contents: write
