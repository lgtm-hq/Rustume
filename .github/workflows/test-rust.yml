# SPDX-License-Identifier: MIT
---
name: Rust Build (workspace)
# Compiles the Rust workspace on PRs and pushes to main.
# Rust tests execute once via cargo llvm-cov in the Coverage Reports workflow.

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/test-rust.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-build:
    # Call reusable-test-rust-build directly (not reusable-rust-build) so the
    # ruleset check name stays rust-build / 🔨 Build Check — an extra nesting
    # hop would prefix build / and break required-status matching.
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-rust-build.yml@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
    with:
      job-name: "🔨 Build Check"
      tooling-ref: '0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e' # v0.33.0
      draft-pr-skip: true
      egress-policy: block
      egress-preset: quality
      runner-image: ubuntu-24.04
      timeout-minutes: 30
    permissions:
      contents: read
