# SPDX-License-Identifier: MIT
---
name: Rust Build (workspace)
# Compiles the Rust workspace on PRs and pushes to main.
# Rust tests execute once via cargo llvm-cov in the Coverage Reports workflow.

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/test-rust.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-build:
    name: "rust-build / 🔨 Build Check"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    defaults:
      run:
        shell: bash
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@dfd52172e5ee817cb1b1baf24895209c5e18d5ad # v0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            static.rust-lang.org:443
            sh.rustup.rs:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@dfd52172e5ee817cb1b1baf24895209c5e18d5ad # v0

      - name: Setup Rust
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/setup-rust@dfd52172e5ee817cb1b1baf24895209c5e18d5ad # v0

      - name: Build all crates
        run: cargo build --workspace --all-features

      - name: Build release
        run: cargo build --workspace --release
