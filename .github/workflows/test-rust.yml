# SPDX-License-Identifier: MIT
---
name: Rust Build (workspace)
# Compiles the Rust workspace on PRs and pushes to main.
# Rust tests execute once via cargo llvm-cov in the Coverage Reports workflow.

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/test-rust.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  rust-build:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-rust-build.yml@69d5990a1d877f752ecd47bd961851b5f6feea36 # v0.32.4
    with:
      job-name: "rust-build / 🔨 Build Check"
      tooling-ref: '69d5990a1d877f752ecd47bd961851b5f6feea36' # v0.32.4
      draft-pr-skip: true
      egress-policy: block
      egress-preset: quality
      runner-image: ubuntu-24.04
      timeout-minutes: 30
    permissions:
      contents: read
