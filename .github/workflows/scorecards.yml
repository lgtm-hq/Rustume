# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - OpenSSF Scorecard Analysis
# Weekly OpenSSF Scorecard security analysis.

"on":
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecards:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-scorecards.yml@cecca744299be6a34f3b4ea4f18c00262081ab61 # v0.41.0
    with:
      job-name: "🛡️ Scorecard Analysis"
      tooling-ref: 'cecca744299be6a34f3b4ea4f18c00262081ab61' # v0.41.0
      egress-policy: block
      egress-preset: scorecard
      allowed-endpoints-mode: append
      allowed-endpoints: >
        agent.api.stepsecurity.io:443
        api.deps.dev:443
        api.osv.dev:443
        api.scorecard.dev:443
        fulcio.sigstore.dev:443
        rekor.sigstore.dev:443
        sigstore.dev:443
        tuf-repo-cdn.sigstore.dev:443
        release-assets.githubusercontent.com:443
        oss-fuzz-build-logs.storage.googleapis.com:443
        ossf.github.io:443
        www.bestpractices.dev:443
    permissions:
      contents: read
      security-events: write
      id-token: write
