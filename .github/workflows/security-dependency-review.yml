# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - Dependency Vulnerability Scan

"on":
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  schedule:
    # Weekly scan: Monday 05:30 UTC
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-security-audit.yml@ba485556d3d4605b825347c2fe431ad4395b1c63 # v0.44.1
    permissions:
      contents: read
      packages: read
    with:
      tooling-ref: 'ba485556d3d4605b825347c2fe431ad4395b1c63' # v0.44.1
      job-name: "Scan dependencies"
      runner-image: ubuntu-24.04
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro:0.61.0@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      upload-comment-artifact: ${{ github.event_name == 'pull_request' }}
      egress-policy: block
      egress-preset: quality

  security-audit-required:
    name: "🔐 Security Audit"
    needs: security-audit
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: 'ba485556d3d4605b825347c2fe431ad4395b1c63' # v0.44.1
          sparse-checkout: |
            .github/actions/harden-runner
            .github/actions/resolve-egress-allowlist
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: block
          egress-preset: github-tooling

      - name: Harden runner
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: block
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Assert required check
        env:
          UPSTREAM_RESULT: ${{ needs.security-audit.result }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/assert-required-check.sh

  post-pr-comment:
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: security-audit
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-security-audit-comment.yml@ba485556d3d4605b825347c2fe431ad4395b1c63 # v0.44.1
    permissions:
      contents: read
      pull-requests: write
    with:
      tooling-ref: 'ba485556d3d4605b825347c2fe431ad4395b1c63' # v0.44.1
      job-name: "💬 Post PR Comment"
      runner-image: ubuntu-24.04
      egress-policy: block
