# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - Dependency Vulnerability Scan

"on":
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  schedule:
    # Weekly scan: Monday 05:30 UTC
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-security-audit.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    permissions:
      contents: read
      packages: read
    with:
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      job-name: "Scan dependencies"
      runner-image: ubuntu-24.04
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro:0.61.0@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      upload-comment-artifact: ${{ github.event_name == 'pull_request' }}
      egress-policy: block
      egress-preset: quality

  security-audit-required:
    name: "🔐 Security Audit"
    needs: security-audit
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        # Direct step-security invocation: lgtm-ci removed its harden-runner
        # composite in v0.50.0 (the action pre hook must install the agent,
        # so allowed-endpoints must be a literal — github-tooling preset).
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            uploads.github.com:443
            pipelines.actions.githubusercontent.com:443

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
          sparse-checkout: |
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Assert required check
        env:
          UPSTREAM_RESULT: ${{ needs.security-audit.result }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/assert-required-check.sh

  post-pr-comment:
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: security-audit
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-security-audit-comment.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    permissions:
      contents: read
      pull-requests: write
    with:
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      job-name: "💬 Post PR Comment"
      runner-image: ubuntu-24.04
      egress-policy: block
