# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - Dependency Vulnerability Scan

"on":
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  schedule:
    # Weekly scan: Monday 05:30 UTC
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-security-audit.yml@cecca744299be6a34f3b4ea4f18c00262081ab61 # v0.41.0
    permissions:
      contents: read
      packages: read
    with:
      tooling-ref: 'cecca744299be6a34f3b4ea4f18c00262081ab61' # v0.41.0
      job-name: "🔐 Security Audit"
      runner-image: ubuntu-24.04
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro:0.61.0@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      upload-comment-artifact: ${{ github.event_name == 'pull_request' }}
      egress-policy: block
      egress-preset: quality

  post-pr-comment:
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: security-audit
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-security-audit-comment.yml@cecca744299be6a34f3b4ea4f18c00262081ab61 # v0.41.0
    permissions:
      contents: read
      pull-requests: write
    with:
      tooling-ref: 'cecca744299be6a34f3b4ea4f18c00262081ab61' # v0.41.0
      job-name: "💬 Post PR Comment"
      runner-image: ubuntu-24.04
      egress-policy: block
