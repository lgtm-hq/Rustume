# SPDX-License-Identifier: MIT
---
name: Security - Dependency Vulnerability Scan

"on":
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  schedule:
    # Weekly scan: Monday 05:30 UTC
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  # py-lintro 0.61.0 pinned to immutable digest for reproducibility
  LINTRO_IMAGE: ghcr.io/lgtm-hq/py-lintro:0.61.0@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887

jobs:
  security-audit:
    name: "🔐 Security Audit"
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.osv.dev:443
            api.deps.dev:443
            github.com:443
            ghcr.io:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            codeload.github.com:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0

      - name: Pull py-lintro Docker image
        run: ./scripts/ci/pull-lintro-image.sh

      - name: Run security audit
        id: audit
        continue-on-error: true
        run: ./scripts/ci/security-audit.sh

      - name: Upload comment artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-audit-comment
          path: security-audit-comment.txt
          if-no-files-found: error

      - name: Fail on vulnerabilities
        if: steps.audit.outcome == 'failure'
        run: ./scripts/ci/fail-audit.sh

  post-pr-comment:
    name: "💬 Post PR Comment"
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: security-audit
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0

      - name: Download comment artifact
        id: download_comment_artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: security-audit-comment

      - name: Post PR comment
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/post-pr-comment@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
        with:
          file: security-audit-comment.txt
          marker: security-audit-report
