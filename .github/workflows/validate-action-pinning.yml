# SPDX-License-Identifier: MIT
---
name: Quality Check - Action Pinning Validation
# Validates that external GitHub Actions are pinned to SHA commits.

"on":
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pinning:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@69d5990a1d877f752ecd47bd961851b5f6feea36 # v0.32.4
    with:
      tooling-ref: '69d5990a1d877f752ecd47bd961851b5f6feea36' # v0.32.4
      egress-policy: block
      egress-preset: github-tooling
      fail-on-error: true
    permissions:
      contents: read
