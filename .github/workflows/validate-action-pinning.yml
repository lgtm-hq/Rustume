# SPDX-License-Identifier: AGPL-3.0-only
---
name: Quality Check - Action Pinning Validation
# Validates that external GitHub Actions are pinned to SHA commits.

"on":
  pull_request:
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pinning:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: github-tooling
      fail-on-error: true
      runner-image: ubuntu-24.04
    permissions:
      contents: read
