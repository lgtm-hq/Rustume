# SPDX-License-Identifier: AGPL-3.0-only
---
name: Quality Check - Action Pinning Validation
# Validates that external GitHub Actions are pinned to SHA commits.

"on":
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pinning:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@ba485556d3d4605b825347c2fe431ad4395b1c63 # v0.44.1
    with:
      tooling-ref: 'ba485556d3d4605b825347c2fe431ad4395b1c63' # v0.44.1
      egress-policy: block
      egress-preset: github-tooling
      fail-on-error: true
      runner-image: ubuntu-24.04
    permissions:
      contents: read
