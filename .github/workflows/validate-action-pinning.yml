# SPDX-License-Identifier: AGPL-3.0-only
---
name: Quality Check - Action Pinning Validation
# Validates that external GitHub Actions are pinned to SHA commits.

"on":
  pull_request:
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@768a6b72f0a5346b5ecba3f4e13b90040472341c # v0.52.4
    with:
      job-name: '📌 Validate Action Pinning'
      tooling-ref: '768a6b72f0a5346b5ecba3f4e13b90040472341c' # v0.52.4
      egress-policy: block
      egress-preset: github-tooling
      fail-on-error: true
      runner-image: ubuntu-24.04
    permissions:
      contents: read
