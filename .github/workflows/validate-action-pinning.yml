# SPDX-License-Identifier: AGPL-3.0-only
---
name: Quality Check - Action Pinning Validation
# Validates that external GitHub Actions are pinned to SHA commits.

"on":
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pinning:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    with:
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      egress-policy: block
      egress-preset: github-tooling
      fail-on-error: true
      runner-image: ubuntu-24.04
    permissions:
      contents: read
