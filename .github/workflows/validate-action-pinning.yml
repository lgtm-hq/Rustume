# SPDX-License-Identifier: MIT
---
name: Quality Check - Action Pinning Validation
# Validates that external GitHub Actions are pinned to SHA commits.

"on":
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pinning:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
    with:
      tooling-ref: '0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e' # v0.33.0
      egress-policy: block
      egress-preset: github-tooling
      fail-on-error: true
    permissions:
      contents: read
