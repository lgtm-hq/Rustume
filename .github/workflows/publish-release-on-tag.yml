# SPDX-License-Identifier: AGPL-3.0-only
---
name: Publish - GitHub Release
# Creates GitHub Release when version tags are pushed.
# Validates tag matches Cargo.toml, builds cross-platform binaries,
# and uses lgtm-ci actions for release creation.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-tag:
    name: ✅ Verify Tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden Runner
        # Direct step-security invocation: lgtm-ci removed its harden-runner
        # composite in v0.50.0 (the action pre hook must install the agent).
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: ./scripts/ci/maintenance/auto-tag.sh read-version

      - name: Verify tag matches Cargo.toml version
        env:
          TAG: ${{ github.ref_name }}
          CARGO_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/ci/release/verify-tag-version.sh

  build-binaries:
    name: 🔨 Build Binaries
    needs: verify-tag
    uses: ./.github/workflows/build-binary.yml
    permissions:
      contents: read

  release:
    name: 📦 Create GitHub Release
    needs: [verify-tag, build-binaries]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        # Direct step-security invocation: lgtm-ci removed its harden-runner
        # composite in v0.50.0 (the action pre hook must install the agent).
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3

      - name: Download all artifacts
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub App installation token
        id: app-token
        # yamllint disable-line rule:line-length
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Create GitHub Release
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/create-github-release@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
        with:
          tag: ${{ github.ref_name }}
          generate-notes: "true"
          files: artifacts/*
          # App token so release:published can trigger downstream workflows
          token: ${{ steps.app-token.outputs.token }}
