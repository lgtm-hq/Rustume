# SPDX-License-Identifier: MIT
---
name: Release - Automated PR Creation
# Computes next semantic version using conventional commits and opens release PR.
# Uses lgtm-ci calculate-version action for version computation.

"on":
  # Gate releases on CI passing: only trigger after the Rust test suite
  # completes on main. The job condition below rejects failed runs.
  workflow_run:
    workflows: ["Test - Rust Test Suite"]
    branches: [main]
    types: [completed]
  # For commits that don't touch Rust source (docs, scripts, templates, etc.)
  # the test suite never runs, so fall back to a direct push trigger.
  push:
    branches: [main]
    paths-ignore:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/test-rust.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  open-release-pr:
    name: Compute next version and open Release PR
    runs-on: ubuntu-24.04
    # When triggered by workflow_run, only proceed if the test suite passed.
    # Push and workflow_dispatch triggers always proceed (no Rust CI to gate on).
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 20
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@282efbc5344859744d952012d982cec7be75c294 # v0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@282efbc5344859744d952012d982cec7be75c294 # v0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Calculate next version
        id: semrel
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/calculate-version@282efbc5344859744d952012d982cec7be75c294 # v0
        with:
          max-bump: minor

      - name: Read current version from Cargo.toml
        id: current
        run: ./scripts/ci/maintenance/auto-tag.sh read-version

      - name: Check if version bump needed
        id: needs_bump
        env:
          NEXT_VERSION: ${{ steps.semrel.outputs.next-version }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: ./scripts/ci/release/check-bump-needed.sh

      - name: Create GitHub App installation token
        if: steps.needs_bump.outputs.required == 'true'
        id: app-token
        # yamllint disable-line rule:line-length
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0-beta.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Update Cargo.toml version
        if: steps.needs_bump.outputs.required == 'true'
        run: >
          ./scripts/ci/maintenance/update-cargo-version.sh
          "${{ steps.semrel.outputs.next-version }}"

      - name: Create Release PR
        if: steps.needs_bump.outputs.required == 'true'
        id: cpr
        # yamllint disable-line rule:line-length
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: >-
            chore(release): cut ${{ steps.semrel.outputs.next-version }}
          title: >-
            chore(release): prepare ${{ steps.semrel.outputs.next-version }}
          body: |
            Automated version bump to `${{ steps.semrel.outputs.next-version }}`.

            - Updates `Cargo.toml` workspace version
            - Respects branch protection (no direct push to `main`)
            - Upon merge, tag and publish workflows run automatically
          branch: release/${{ steps.semrel.outputs.next-version }}
          base: main
          labels: |
            release-bump

      - name: Enable auto-merge for Release PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: ./scripts/ci/release/enable-auto-merge.sh
