# SPDX-License-Identifier: AGPL-3.0-only
---
name: Release - Automated PR Creation
# Computes next semantic version using conventional commits and opens release PR.

"on":
  # Gate releases on CI passing: only trigger after the Rust build workflow
  # completes on main. The job condition below rejects failed runs.
  workflow_run:
    workflows: ["Rust Build (workspace)"]
    branches: [main]
    types: [completed]
  # For commits that don't touch Rust source (docs, scripts, Docker, etc.)
  # the test suite never runs, so fall back to a direct push trigger.
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/**"
      - "docker/**"
      - "**.md"
      - "renovate.json"
      - ".github/**"
      - "Makefile"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-release-pr:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-version-pr.yml@ba485556d3d4605b825347c2fe431ad4395b1c63 # v0.44.1
    with:
      ecosystems: rust
      auto-merge: true
      max-bump: minor
      tooling-ref: 'ba485556d3d4605b825347c2fe431ad4395b1c63' # v0.44.1
      egress-policy: block
      egress-preset: github-tooling
      runner-image: ubuntu-24.04
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
