# SPDX-License-Identifier: MIT
---
name: PR - Auto Assign
# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened, reopened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@69d5990a1d877f752ecd47bd961851b5f6feea36 # v0.32.4
    with:
      job-name: "👤 Auto Assign PR Author"
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '69d5990a1d877f752ecd47bd961851b5f6feea36' # v0.32.4
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
