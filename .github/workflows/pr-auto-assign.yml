# SPDX-License-Identifier: MIT
---
name: PR - Auto Assign
# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened, reopened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
    with:
      job-name: "👤 Auto Assign PR Author"
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e' # v0.33.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
