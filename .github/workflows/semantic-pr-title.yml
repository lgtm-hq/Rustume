# SPDX-License-Identifier: AGPL-3.0-only
---
name: PR - Title Validation
# Validates PR titles follow Conventional Commits format.

"on":
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@b620af6996fc59f8de7fba1d451f76c67d788339 # v0.41.0
    with:
      job-name: "📝 Validate PR Title"
      tooling-ref: 'b620af6996fc59f8de7fba1d451f76c67d788339' # v0.41.0
      egress-policy: block
      egress-preset: github-tooling
      comment-marker: "<!-- semantic-pr-title -->"
    permissions:
      contents: read
      pull-requests: write
