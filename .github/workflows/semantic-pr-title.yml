# SPDX-License-Identifier: MIT
---
name: PR - Title Validation
# Validates PR titles follow Conventional Commits format.

"on":
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
    with:
      job-name: "📝 Validate PR Title"
      tooling-ref: '0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e' # v0.33.0
      egress-policy: block
      egress-preset: github-tooling
      comment-marker: "<!-- semantic-pr-title -->"
    permissions:
      contents: read
      pull-requests: write
