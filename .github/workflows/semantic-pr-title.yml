# SPDX-License-Identifier: AGPL-3.0-only
---
name: PR - Title Validation
# Validates PR titles follow Conventional Commits format.

"on":
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    with:
      job-name: "📝 Validate PR Title"
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      egress-policy: block
      egress-preset: github-tooling
      comment-marker: "<!-- semantic-pr-title -->"
    permissions:
      contents: read
      pull-requests: write
