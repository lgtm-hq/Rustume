# SPDX-License-Identifier: MIT
---
name: PR - Title Validation
# Validates PR titles follow Conventional Commits format.

"on":
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@69d5990a1d877f752ecd47bd961851b5f6feea36 # v0.32.4
    with:
      job-name: "📝 Validate PR Title"
      tooling-ref: '69d5990a1d877f752ecd47bd961851b5f6feea36' # v0.32.4
      egress-policy: block
      egress-preset: github-tooling
      types: |
        chore
        ci
        docs
        feat
        fix
        perf
        refactor
        revert
        style
        test
        build
    permissions:
      contents: read
      # lgtm-ci reusable-semantic-pr-title → amannn/action-semantic-pull-request:
      # read PR title/metadata only (read-only; satisfies least-privilege audits).
      pull-requests: read
