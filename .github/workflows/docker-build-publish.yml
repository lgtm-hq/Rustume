# SPDX-License-Identifier: MIT
---
name: Build - Docker Image & Registry
# Builds and publishes Docker images to GHCR.
# - push main (path-filtered): :main and :sha-* for bleeding-edge
# - push v*.*.* tags: :latest and semver tags for releases
# Uses lgtm-ci reusable Docker workflow.

"on":
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "apps/web/**"
      - "crates/**"
      - "bindings/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".dockerignore"
      - ".github/workflows/docker-build-publish.yml"
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    name: 🐳 Docker Build & Publish
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@58be2e8b58936973af5da34f19f5fea7336ba1e5 # v0.13.3
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: docker/Dockerfile
      image-name: lgtm-hq/rustume
      version: >-
        ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '') }}
      push: >-
        ${{ github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/v')
        || github.event_name == 'release' }}
      platforms: linux/amd64,linux/arm64
      scan: true
      provenance: true
      sbom: true
      smoke-test: --health
