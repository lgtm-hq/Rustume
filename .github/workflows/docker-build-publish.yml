---
name: Build - Docker Image & Registry
# Builds and publishes Docker images to GHCR via lgtm-ci reusable-docker.
# - PRs: native multi-arch validation (build + smoke + blocking scan, no push)
# - main/tags: publish, cosign sign, SBOM, provenance, registry cache
#   (no `release:` trigger: publish-release-on-tag.yml creates the GitHub
#   Release from the tag, so a release trigger would rebuild the identical
#   image a second time — see #454. Tag pushes always fire: GitHub does not
#   evaluate `paths` filters for tag pushes.)
#
# Path filtering (#476): required-check-safe deny-by-default. There is no
# on.<event>.paths allow-list (those rot when new top-level dirs appear).
# Instead the `classify` job resolves pipeline=false only when EVERY changed
# file matches the skip-list (markdown / docs/**); anything else — including
# brand-new directories — runs Docker. Classification failures fail open.
# Release bump-only merges still skip via classify_release_bump.sh (#457).
#
# Rustume Cloud deploy tags (reusable-docker metadata-action):
#   main push  -> ghcr.io/lgtm-hq/rustume:main, :sha-<commit>
#   v*.*.* tag -> ghcr.io/lgtm-hq/rustume:<semver>, :latest, :sha-<commit>
# Staging should track :main (or digest-pin sha-<commit> from the same build).
# Production should track release semver tags (prefer digest-pinned sha-<commit>).
# See docs/operations/rustume-cloud-deploy.md.

"on":
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded PR validate runs; never cancel main/tag/release publishes
# (a cancelled publish would leave GHCR tags, signatures, and the Railway
# deploy chain in a partial state).
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: >-
    ${{ github.event_name == 'pull_request' }}

jobs:
  # Path relevance (#476) + release bump-only (#457). Always runs so required
  # docker contexts are never absent. Downstream compares != 'false' /
  # != 'true' with always() so a failed classify job fails open (runs docker).
  classify:
    name: 🔎 Classify Docker Relevance
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      pipeline: ${{ steps.paths.outputs.pipeline }}
      bump-only: ${{ steps.bump.outputs.bump-only }}
      skip-reason: ${{ steps.paths.outputs.skip-reason }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Classify path relevance
        id: paths
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/docker/resolve_docker_relevance.sh
      - name: Classify release bump
        id: bump
        if: >-
          github.event_name == 'push'
          && github.ref == 'refs/heads/main'
          && startsWith(github.event.head_commit.message, 'chore(release): version')
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bash scripts/ci/docker/classify_release_bump.sh

  docker:
    name: 🐳 Docker Build & Publish
    needs: classify
    if: >-
      always()
      && needs.classify.outputs.pipeline != 'false'
      && needs.classify.outputs.bump-only != 'true'
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      file: docker/Dockerfile
      image-name: lgtm-hq/rustume
      version: >-
        ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/v')) }}
      validate-on-pr: ${{ github.event_name == 'pull_request' }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test-script: scripts/ci/docker/smoke-test.sh
      # Cold amd64 builds (no registry cache hit) exceed the 60-minute
      # default: the workspace cargo build alone runs ~50 minutes (#439).
      timeout-minutes: 120
      scan: true
      scan-exit-code: "1"
      cosign-sign: true
      cache-registry-ref: ghcr.io/lgtm-hq/rustume:cache
      no-cache: ${{ startsWith(github.ref, 'refs/tags/v') }}
      # SBOM/provenance attestations produce manifest lists incompatible with
      # --load used during PR validation (validate-on-pr + scan).
      provenance: ${{ github.event_name != 'pull_request' }}
      sbom: ${{ github.event_name != 'pull_request' }}
      # Harden-runner pre reads workflow inputs only (not resolved presets).
      # Full list = reusable-docker default + gcr.io (distroless base image
      # in docker/Dockerfile) + sigstore hosts (cosign-sign on push runs) +
      # trivy hosts (installer downloads from get.trivy.dev; vulnerability DB
      # is pulled from ghcr.io with mirror.gcr.io / public.ecr.aws fallbacks) +
      # dl-cdn.alpinelinux.org (apk package installs in docker/Dockerfile
      # build stages run through the host egress proxy under harden-runner) +
      # rust hosts (rustup target add wasm32 pulls from static.rust-lang.org;
      # cargo install cargo-chef/wasm-pack/wasm-bindgen-cli fetch the crates
      # index and .crate files from index.crates.io / static.crates.io) +
      # registry.npmjs.org (bun install in the web-builder stage downloads
      # packages from the npm registry on cache-cold builds).
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        github-releases.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
        docker.io:443
        registry-1.docker.io:443
        auth.docker.io:443
        production.cloudflare.docker.com:443
        production.cloudfront.docker.com:443
        gcr.io:443
        fulcio.sigstore.dev:443
        rekor.sigstore.dev:443
        tuf-repo-cdn.sigstore.dev:443
        timestamp.sigstore.dev:443
        get.trivy.dev:443
        mirror.gcr.io:443
        public.ecr.aws:443
        dl-cdn.alpinelinux.org:443
        static.rust-lang.org:443
        crates.io:443
        index.crates.io:443
        static.crates.io:443
        registry.npmjs.org:443
