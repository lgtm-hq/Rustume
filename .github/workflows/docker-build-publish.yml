# SPDX-License-Identifier: MIT
---
name: Build - Docker Image & Registry
# Builds and publishes Docker images to GHCR via lgtm-ci reusable-docker.
# - PRs: native multi-arch validation (build + smoke + blocking scan, no push)
# - main/tags/release: publish, cosign sign, SBOM, provenance, registry cache

"on":
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths: &docker-paths
      - "docker/**"
      - "apps/web/**"
      - "crates/**"
      - "bindings/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".dockerignore"
      - ".github/workflows/docker-build-publish.yml"
      - "scripts/ci/docker/**"
  pull_request:
    branches: [main]
    paths: *docker-paths
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    name: 🐳 Docker Build & Publish
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@e5c325f71b137eb7e9dc546a441662e8b7488d21 # v0.17.2
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: docker/Dockerfile
      image-name: lgtm-hq/rustume
      version: >-
        ${{ startsWith(github.ref, 'refs/tags/')
        && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '') }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/v')
        || github.event_name == 'release') }}
      validate-on-pr: ${{ github.event_name == 'pull_request' }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test-script: scripts/ci/docker/smoke-test.sh
      scan: true
      scan-exit-code: "1"
      cosign-sign: true
      cache-registry-ref: ghcr.io/lgtm-hq/rustume:cache
      no-cache: ${{ startsWith(github.ref, 'refs/tags/v') }}
      # SBOM/provenance attestations produce manifest lists incompatible with
      # --load used during PR validation (validate-on-pr + scan).
      provenance: ${{ github.event_name != 'pull_request' }}
      sbom: ${{ github.event_name != 'pull_request' }}
