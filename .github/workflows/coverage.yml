# SPDX-License-Identifier: MIT
---
name: Coverage Reports
# Runs Rust and Web coverage and posts separate PR comments.
# Uses lgtm-ci actions for setup, coverage collection, and PR comments.

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/coverage.yml"
      - "scripts/ci/testing/ci-coverage-pr-comment.sh"
      - "scripts/ci/testing/ci-rust-coverage.sh"
      - "scripts/ci/testing/ci-web-coverage.sh"
      - "scripts/ci/testing/fail-on-coverage.sh"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-coverage:
    name: 🦀 Rust Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 45
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    defaults:
      run:
        shell: bash
    concurrency:
      group: rust-coverage-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@7a841708a04853ff21c9874a556ce279d1668f5a # v0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            static.rust-lang.org:443
            sh.rustup.rs:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@7a841708a04853ff21c9874a556ce279d1668f5a # v0

      - name: Setup Rust
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/setup-rust@7a841708a04853ff21c9874a556ce279d1668f5a # v0

      - name: Run Rust coverage
        id: rust-coverage
        run: ./scripts/ci/testing/ci-rust-coverage.sh
        continue-on-error: true

      - name: Collect Rust coverage
        id: rust-collect
        if: steps.rust-coverage.outcome == 'success'
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/collect-coverage@7a841708a04853ff21c9874a556ce279d1668f5a # v0
        with:
          coverage-files: rust-coverage.lcov
          input-format: lcov
          output-format: lcov

      - name: Generate Rust coverage PR comment
        if: github.event_name == 'pull_request'
        env:
          COVERAGE_NAME: Rust
          COVERAGE_MARKER: "<!-- rust-coverage-report -->"
          COVERAGE_COMMAND: >-
            cargo llvm-cov --workspace --all-features --lcov
            --output-path rust-coverage.lcov
          COVERAGE_OUTPUT_FILE: rust-coverage-pr-comment.txt
          COVERAGE_TOOL: cargo llvm-cov
          COVERAGE_LOG_FILE: rust-coverage-output.txt
          COVERAGE_LINES: ${{ steps.rust-collect.outputs.lines-coverage }}
          COVERAGE_BRANCHES: ${{ steps.rust-collect.outputs.branches-coverage }}
          COVERAGE_FUNCTIONS: ${{ steps.rust-collect.outputs.functions-coverage }}
        run: ./scripts/ci/testing/ci-coverage-pr-comment.sh

      - name: Comment PR with Rust coverage
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/post-pr-comment@7a841708a04853ff21c9874a556ce279d1668f5a # v0
        with:
          file: rust-coverage-pr-comment.txt
          marker: "<!-- rust-coverage-report -->"

      - name: Fail if Rust coverage failed
        if: env.RUST_COVERAGE_EXIT_CODE != '0'
        env:
          COVERAGE_NAME: Rust
        run: ./scripts/ci/testing/fail-on-coverage.sh

  web-coverage:
    name: 🌐 Web Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 30
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    defaults:
      run:
        shell: bash
    concurrency:
      group: web-coverage-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@7a841708a04853ff21c9874a556ce279d1668f5a # v0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@7a841708a04853ff21c9874a556ce279d1668f5a # v0

      - name: Setup Node
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/setup-node@7a841708a04853ff21c9874a556ce279d1668f5a # v0
        with:
          cache-dependency-path: apps/web/bun.lock
          install-dependencies: "false"
          working-directory: apps/web

      - name: Run Web coverage
        id: web-coverage
        run: ./scripts/ci/testing/ci-web-coverage.sh
        continue-on-error: true

      - name: Collect Web coverage
        id: web-collect
        if: steps.web-coverage.outcome == 'success'
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/collect-coverage@7a841708a04853ff21c9874a556ce279d1668f5a # v0
        with:
          coverage-files: apps/web/coverage/coverage-summary.json
          input-format: istanbul
          output-format: json

      - name: Generate Web coverage PR comment
        if: github.event_name == 'pull_request'
        env:
          COVERAGE_NAME: Web
          COVERAGE_MARKER: "<!-- web-coverage-report -->"
          COVERAGE_COMMAND: bun run test:coverage
          COVERAGE_OUTPUT_FILE: web-coverage-pr-comment.txt
          COVERAGE_TOOL: Vitest
          COVERAGE_LOG_FILE: web-coverage-output.txt
          COVERAGE_LINES: ${{ steps.web-collect.outputs.lines-coverage }}
          COVERAGE_BRANCHES: ${{ steps.web-collect.outputs.branches-coverage }}
          COVERAGE_FUNCTIONS: ${{ steps.web-collect.outputs.functions-coverage }}
        run: ./scripts/ci/testing/ci-coverage-pr-comment.sh

      - name: Comment PR with Web coverage
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/post-pr-comment@7a841708a04853ff21c9874a556ce279d1668f5a # v0
        with:
          file: web-coverage-pr-comment.txt
          marker: "<!-- web-coverage-report -->"

      - name: Fail if Web coverage failed
        if: env.WEB_COVERAGE_EXIT_CODE != '0'
        env:
          COVERAGE_NAME: Web
        run: ./scripts/ci/testing/fail-on-coverage.sh
