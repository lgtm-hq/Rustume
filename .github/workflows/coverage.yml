# SPDX-License-Identifier: AGPL-3.0-only
---
name: Coverage Reports

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/coverage.yml"
      - "scripts/ci/testing/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-rust-test.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    permissions:
      contents: read
      pull-requests: write # publish-test-summary on PRs
    with:
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      job-name: "🦀 Rust Coverage"
      coverage: true
      upload-pages-coverage-html: true
      pages-coverage-artifact-name: rust-coverage-html
      comment-marker: rust-coverage-report
      publish-test-summary: true
      runner-image: ubuntu-24.04
      timeout-minutes: 45

  web-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-node.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    permissions:
      contents: read
      pull-requests: write # required: reusable declares this on internal publish job
    with:
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      job-name: "🌐 Web Coverage"
      node-version: "22"
      working-directory: apps/web
      package-manager: bun
      coverage: true
      coverage-format: html
      comment-marker: web-coverage-report
      coverage-summary-file: coverage/coverage-summary.json
      upload-coverage: true
      upload-pages-coverage-html: true
      pages-coverage-artifact-name: web-coverage-html
      pages-coverage-source-subpath: coverage
      publish-test-summary: false
      runner-image: ubuntu-24.04
      timeout-minutes: 30

  publish-web-coverage:
    needs: web-coverage
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-test-summary.yml@617df664f7ff0b4c2b85126e3c183ad744617dee # v0.44.0
    permissions:
      contents: read # download node-coverage-22 artifact from the test job
      pull-requests: write # post or update the web coverage summary comment
    with:
      tooling-ref: '617df664f7ff0b4c2b85126e3c183ad744617dee' # v0.44.0
      egress-policy: block
      egress-preset: github-tooling
      test-suite-name: "🌐 Web Coverage"
      comment-marker: web-coverage-report
      tests-passed: ${{ needs.web-coverage.outputs['tests-passed'] }}
      tests-failed: ${{ needs.web-coverage.outputs['tests-failed'] }}
      tests-total: ${{ needs.web-coverage.outputs['tests-total'] }}
      coverage-percent: ${{ needs.web-coverage.outputs['coverage-percent'] }}
      coverage-threshold: "0"
      job-result: ${{ needs.web-coverage.result }}
      rich-coverage-comment: true
      coverage-artifact-name: node-coverage-22
      coverage-file: apps/web/coverage/coverage-summary.json
      coverage-format: istanbul
