# SPDX-License-Identifier: AGPL-3.0-only
---
name: Coverage Reports

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/coverage.yml"
      - "scripts/ci/testing/**"
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-server-db-integration:
    name: "🐘 Server DB Integration"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rustume_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/rustume_test
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            pipelines.actions.githubusercontent.com:443
            static.rust-lang.org:443
            sh.rustup.rs:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: 66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
          sparse-checkout: |
            .github/actions/setup-rust
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Setup Rust
        uses: ./.lgtm-ci-tooling/.github/actions/setup-rust
      - name: Setup nextest toolchain
        run: bash .lgtm-ci-tooling/scripts/ci/testing/rust/setup-rust-nextest.sh
      - name: Run server DB integration tests
        run: bash scripts/ci/testing/rust/run-server-db-integration-ci.sh

  rust-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-rust-test.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    permissions:
      contents: read
      pull-requests: write # publish-test-summary on PRs
    with:
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      job-name: "🦀 Rust Coverage"
      coverage: true
      setup-script: scripts/ci/testing/rust/setup-postgres-test-db.sh
      upload-pages-coverage-html: true
      pages-coverage-artifact-name: rust-coverage-html
      comment-marker: rust-coverage-report
      publish-test-summary: true
      runner-image: ubuntu-24.04
      timeout-minutes: 45

  web-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-node.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    permissions:
      contents: read
      pull-requests: write # publish-test-summary on PRs
    with:
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      job-name: "🌐 Web Coverage"
      node-version: "22"
      working-directory: apps/web
      package-manager: bun
      coverage: true
      coverage-format: html
      comment-marker: web-coverage-report
      coverage-summary-file: coverage/coverage-summary.json
      upload-coverage: true
      upload-pages-coverage-html: true
      pages-coverage-artifact-name: web-coverage-html
      pages-coverage-source-subpath: coverage
      # TODO(lgtm-hq/lgtm-ci#511): revert to true once reusable-test-node's
      # "Stage coverage for test summary" step sets the COVERAGE env var. At
      # v0.52.3 the step hard-fails for single-version coverage callers on
      # PRs, taking the required 🌐 Web Coverage check down with it.
      publish-test-summary: false
      runner-image: ubuntu-24.04
      timeout-minutes: 30
