# SPDX-License-Identifier: MIT
---
name: Coverage Reports
# Runs Rust and Web coverage and posts separate PR comments.

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/coverage.yml"
      - "scripts/ci/github/ci-post-pr-comment.sh"
      - "scripts/ci/testing/ci-coverage-metrics.sh"
      - "scripts/ci/testing/ci-coverage-pr-comment.sh"
      - "scripts/ci/testing/ci-rust-coverage.sh"
      - "scripts/ci/testing/ci-setup-rust-coverage.sh"
      - "scripts/ci/testing/ci-setup-web-coverage.sh"
      - "scripts/ci/testing/ci-web-coverage.sh"
      - "scripts/ci/testing/fail-on-coverage.sh"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-coverage:
    name: 🦀 Rust Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 45
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    defaults:
      run:
        shell: bash
    concurrency:
      group: rust-coverage-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        run: ./scripts/ci/testing/ci-setup-rust-coverage.sh

      - name: Run Rust coverage
        id: rust-coverage
        run: ./scripts/ci/testing/ci-rust-coverage.sh
        continue-on-error: true

      - name: Collect Rust coverage metrics
        id: rust-metrics
        if: steps.rust-coverage.outcome == 'success'
        run: ./scripts/ci/testing/ci-coverage-metrics.sh lcov rust-coverage.lcov

      - name: Generate Rust coverage PR comment
        if: github.event_name == 'pull_request'
        env:
          COVERAGE_NAME: Rust
          COVERAGE_MARKER: "<!-- rust-coverage-report -->"
          COVERAGE_COMMAND: >-
            cargo llvm-cov --workspace --all-features --lcov
            --output-path rust-coverage.lcov
          COVERAGE_OUTPUT_FILE: rust-coverage-pr-comment.txt
          COVERAGE_TOOL: cargo llvm-cov
          COVERAGE_LOG_FILE: rust-coverage-output.txt
          COVERAGE_LINES: ${{ steps.rust-metrics.outputs.lines-coverage }}
          COVERAGE_BRANCHES: ${{ steps.rust-metrics.outputs.branches-coverage }}
          COVERAGE_FUNCTIONS: ${{ steps.rust-metrics.outputs.functions-coverage }}
        run: ./scripts/ci/testing/ci-coverage-pr-comment.sh

      - name: Comment PR with Rust coverage
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ github.token }}
          MARKER: "<!-- rust-coverage-report -->"
        run: ./scripts/ci/github/ci-post-pr-comment.sh rust-coverage-pr-comment.txt

      - name: Fail if Rust coverage failed
        if: env.RUST_COVERAGE_EXIT_CODE != '0'
        env:
          COVERAGE_NAME: Rust
        run: ./scripts/ci/testing/fail-on-coverage.sh

  web-coverage:
    name: 🌐 Web Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 30
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    defaults:
      run:
        shell: bash
    concurrency:
      group: web-coverage-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Web coverage tools
        run: ./scripts/ci/testing/ci-setup-web-coverage.sh

      - name: Run Web coverage
        id: web-coverage
        run: ./scripts/ci/testing/ci-web-coverage.sh
        continue-on-error: true

      - name: Collect Web coverage metrics
        id: web-metrics
        if: steps.web-coverage.outcome == 'success'
        run: >-
          ./scripts/ci/testing/ci-coverage-metrics.sh
          istanbul-summary
          apps/web/coverage/coverage-summary.json

      - name: Generate Web coverage PR comment
        if: github.event_name == 'pull_request'
        env:
          COVERAGE_NAME: Web
          COVERAGE_MARKER: "<!-- web-coverage-report -->"
          COVERAGE_COMMAND: bun run test:coverage
          COVERAGE_OUTPUT_FILE: web-coverage-pr-comment.txt
          COVERAGE_TOOL: Vitest
          COVERAGE_LOG_FILE: web-coverage-output.txt
          COVERAGE_LINES: ${{ steps.web-metrics.outputs.lines-coverage }}
          COVERAGE_BRANCHES: ${{ steps.web-metrics.outputs.branches-coverage }}
          COVERAGE_FUNCTIONS: ${{ steps.web-metrics.outputs.functions-coverage }}
          COVERAGE_STATEMENTS: ${{ steps.web-metrics.outputs.statements-coverage }}
        run: ./scripts/ci/testing/ci-coverage-pr-comment.sh

      - name: Comment PR with Web coverage
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == false
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ github.token }}
          MARKER: "<!-- web-coverage-report -->"
        run: ./scripts/ci/github/ci-post-pr-comment.sh web-coverage-pr-comment.txt

      - name: Fail if Web coverage failed
        if: env.WEB_COVERAGE_EXIT_CODE != '0'
        env:
          COVERAGE_NAME: Web
        run: ./scripts/ci/testing/fail-on-coverage.sh
