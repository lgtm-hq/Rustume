# SPDX-License-Identifier: MIT
---
name: Coverage Reports

"on":
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**.ts"
      - "**.tsx"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/web/**"
      - ".github/workflows/coverage.yml"
      - "scripts/ci/testing/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-rust-test.yml@69d5990a1d877f752ecd47bd961851b5f6feea36 # v0.32.4
    permissions:
      contents: read
      pull-requests: write # publish-test-summary on PRs
    with:
      tooling-ref: f469f4d5c187f0700ccec4c023152fb68ee3dc89 # v0.32.3
      job-name: "🦀 Rust Coverage"
      coverage: true
      upload-pages-coverage-html: true
      pages-coverage-artifact-name: rust-coverage-html
      comment-marker: rust-coverage-report
      publish-test-summary: true
      runner-image: ubuntu-24.04
      timeout-minutes: 45

  web-coverage:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-node.yml@69d5990a1d877f752ecd47bd961851b5f6feea36 # v0.32.4
    permissions:
      contents: read
      pull-requests: write # publish-test-summary on PRs
    with:
      tooling-ref: f469f4d5c187f0700ccec4c023152fb68ee3dc89 # v0.32.3
      job-name: "🌐 Web Coverage"
      node-version: "22"
      working-directory: apps/web
      package-manager: bun
      coverage: true
      coverage-format: html
      comment-marker: web-coverage-report
      coverage-summary-file: coverage/coverage-summary.json
      upload-coverage: true
      upload-pages-coverage-html: true
      pages-coverage-artifact-name: web-coverage-html
      pages-coverage-source-subpath: coverage
      publish-test-summary: true
      runner-image: ubuntu-24.04
      timeout-minutes: 30
