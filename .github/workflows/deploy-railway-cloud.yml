# SPDX-License-Identifier: AGPL-3.0-only
---
name: Deploy - Rustume Cloud (Railway)

# After a successful GHCR publish on main, deploy to Railway via GraphQL API.
# Requires repository secret: RAILWAY_API_TOKEN (or RAILWAY_TOKEN).
#
# Environment IDs target the current single Railway service (production).
# If a dedicated staging environment is created later, update the IDs below.

"on":
  workflow_run:
    workflows:
      - Build - Docker Image & Registry
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log actions without deploying)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-railway-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # Mirror of the classify gate in docker-build-publish.yml (#457): a
  # release-version-bump-only merge skips the docker build but its run still
  # concludes "success", so without this gate we would redeploy a byte-
  # identical :main image. Candidates are nominated by commit message; the
  # diff classifier decides (bump PRs carrying dependency updates deploy).
  classify:
    name: 🔎 Classify Release Bump
    if: >-
      github.event_name == 'workflow_run'
      && startsWith(github.event.workflow_run.head_commit.message,
      'chore(release): version')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      bump-only: ${{ steps.check.outputs.bump-only }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Classify diff
        id: check
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/ci/docker/classify_release_bump.sh

  deploy:
    name: 🚀 Deploy to Railway
    needs: classify
    if: >-
      always() &&
      needs.classify.outputs.bump-only != 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository))
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      RAILWAY_PROJECT_ID: 83fe27c6-ab4b-444e-97bb-f7773c92c87a
      RAILWAY_ENVIRONMENT_ID: 78af5529-02bd-42b6-8436-99f6d0e39114
      RAILWAY_SERVICE_ID: d222fc2e-8318-453f-839f-869521b87c7a
      RAILWAY_IMAGE: ghcr.io/lgtm-hq/rustume:main
    steps:
      - name: Harden Runner
        # Direct step-security invocation: lgtm-ci removed its harden-runner
        # composite in v0.50.0 (the action pre hook must install the agent).
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            backboard.railway.com:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
        with:
          persist-credentials: false

      - name: Create GitHub Deployment
        id: deployment
        if: inputs.dry_run != true && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_REF: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: bash scripts/ci/railway/create-github-deployment.sh

      - name: Deploy GHCR image to Railway
        id: railway_deploy
        if: inputs.dry_run != true && inputs.dry_run != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN || secrets.RAILWAY_TOKEN }}
        run: bash scripts/ci/railway/deploy-ghcr.sh --graphql-only

      - name: Dry run
        if: inputs.dry_run == true || inputs.dry_run == 'true'
        run: bash scripts/ci/railway/dry-run-deploy.sh

      - name: Poll deployment status
        if: inputs.dry_run != true && inputs.dry_run != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN || secrets.RAILWAY_TOKEN }}
          RAILWAY_DEPLOYMENT_ID: ${{ steps.railway_deploy.outputs.deployment_id }}
        run: bash scripts/ci/railway/poll-deploy-status.sh

      - name: Update GitHub Deployment (success)
        if: >-
          success() &&
          steps.deployment.outputs.id &&
          inputs.dry_run != true &&
          inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_ID: ${{ steps.deployment.outputs.id }}
          DEPLOY_STATE: success
          DEPLOY_ENVIRONMENT_URL: https://app.rustume.com
          DEPLOY_DESCRIPTION: Deployed to Railway
        run: bash scripts/ci/railway/update-github-deployment-status.sh

      - name: Update GitHub Deployment (failure)
        if: >-
          (failure() || cancelled()) &&
          steps.deployment.outputs.id &&
          inputs.dry_run != true &&
          inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_ID: ${{ steps.deployment.outputs.id }}
          DEPLOY_STATE: failure
          DEPLOY_DESCRIPTION: Railway deployment failed — investigate and rollback manually
        run: bash scripts/ci/railway/update-github-deployment-status.sh
