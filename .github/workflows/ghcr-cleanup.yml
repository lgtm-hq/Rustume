# SPDX-License-Identifier: AGPL-3.0-only
---
name: Maintenance - GHCR Registry Cleanup
# Weekly cleanup of untagged and aged tagged container images from GHCR.
# Untagged pruning uses lgtm-ci reusable-ghcr-cleanup; tagged retention policy
# stays inline (reusable has no tagged-prune inputs).

"on":
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no deletions)"
        required: false
        default: false
        type: boolean
      min_age_days:
        description: "Minimum age in days before deleting untagged images"
        required: false
        default: 7
        type: number
      main_retention_days:
        description: "Retention for main/sha-* tagged images"
        required: false
        default: 30
        type: number
      prerelease_retention_days:
        description: "Retention for pre-release tagged images"
        required: false
        default: 90
        type: number

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  prune-untagged:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-ghcr-cleanup.yml@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
    permissions:
      contents: read
      packages: write
    with:
      package-name: rustume
      min-age-days: ${{ inputs.min_age_days || 7 }}
      dry-run: ${{ inputs.dry_run == true }}
      tooling-ref: '96a42109637efd4c019d176e0902e3be23295716' # v0.45.1
      egress-policy: audit
      runner-image: ubuntu-24.04
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  prune-tagged:
    name: 🏷️ Prune Aged Tagged Images
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
        with:
          egress-policy: audit

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
        with:
          persist-credentials: false

      - name: Prune aged tagged GHCR versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PRUNE_DRY_RUN: >-
            ${{ inputs.dry_run == true && '1' || '0' }}
          GHCR_MAIN_RETENTION_DAYS: >-
            ${{ format('{0}', inputs.main_retention_days) || '30' }}
          GHCR_PRERELEASE_RETENTION_DAYS: >-
            ${{ format('{0}', inputs.prerelease_retention_days) || '90' }}
          GHCR_PACKAGE_NAME: rustume
        run: ./scripts/ci/maintenance/ghcr-prune-tags.sh
