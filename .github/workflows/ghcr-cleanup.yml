# SPDX-License-Identifier: MIT
---
name: Maintenance - GHCR Registry Cleanup
# Weekly cleanup of untagged and aged tagged container images from GHCR.

"on":
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no deletions)"
        required: false
        default: false
        type: boolean
      min_age_days:
        description: "Minimum age in days before deleting untagged images"
        required: false
        default: 7
        type: number
      main_retention_days:
        description: "Retention for main/sha-* tagged images"
        required: false
        default: 30
        type: number
      prerelease_retention_days:
        description: "Retention for pre-release tagged images"
        required: false
        default: 90
        type: number

permissions:
  contents: read

jobs:
  prune-untagged:
    name: 🧹 Prune Untagged Images
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prune untagged GHCR versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PRUNE_MIN_AGE_DAYS: >-
            ${{ format('{0}', inputs.min_age_days) || '7' }}
          GHCR_PRUNE_DRY_RUN: >-
            ${{ inputs.dry_run == true && '1' || '0' }}
        run: ./scripts/ci/maintenance/ghcr-prune-untagged.sh

  prune-tagged:
    name: 🏷️ Prune Aged Tagged Images
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prune aged tagged GHCR versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PRUNE_DRY_RUN: >-
            ${{ inputs.dry_run == true && '1' || '0' }}
          GHCR_MAIN_RETENTION_DAYS: >-
            ${{ format('{0}', inputs.main_retention_days) || '30' }}
          GHCR_PRERELEASE_RETENTION_DAYS: >-
            ${{ format('{0}', inputs.prerelease_retention_days) || '90' }}
        run: ./scripts/ci/maintenance/ghcr-prune-tags.sh
