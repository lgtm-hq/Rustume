# SPDX-License-Identifier: AGPL-3.0-only
---
name: Build - Cross-Platform Binaries
# Builds Rustume CLI and server binaries for multiple platforms.
# Uses lgtm-ci actions for setup. Called by release workflow.

"on":
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: 🔨 Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Harden Runner
        # Direct step-security invocation: lgtm-ci removed its harden-runner
        # composite in v0.50.0 (the action pre hook must install the agent).
        # Linux-only guard matches the lgtm-ci reusable preambles; the agent
        # does not support the macOS/Windows matrix legs.
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        if: runner.os != 'Windows'
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0

      - name: Checkout (Windows)
        if: runner.os == 'Windows'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Rust
        # v0.53.1 pin (rest of the repo stays on v0.52.3): picks up the
        # setup-rust cargo-binstall fix for Windows Git Bash
        # (MINGW64_NT-* was "Unsupported OS", skipping release artifacts).
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/setup-rust@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl') && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binaries
        env:
          TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: ./scripts/ci/release/build-binaries.sh

      - name: Read version from Cargo.toml
        id: version
        run: ./scripts/ci/maintenance/auto-tag.sh read-version

      - name: Package binaries (unix)
        if: matrix.archive == 'tar.gz'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: ./scripts/ci/release/package-unix.sh

      - name: Package binaries (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: ./scripts/ci/release/package-windows.ps1

      - name: Upload artifacts
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustume-${{ matrix.target }}
          path: |
            rustume-*.tar.gz
            rustume-*.tar.gz.sha256
            rustume-*.zip
            rustume-*.zip.sha256
          if-no-files-found: error
          retention-days: 7
