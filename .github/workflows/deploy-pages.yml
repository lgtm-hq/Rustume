# SPDX-License-Identifier: AGPL-3.0-only
---
name: Deploy - GitHub Pages

"on":
  workflow_run:
    workflows:
      - Coverage Reports
      - Quality - Documentation Site
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    # Pin commit SHA (not annotated tag object SHA) for reusable workflow resolution.
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-deploy-site-with-reports.yml@b620af6996fc59f8de7fba1d451f76c67d788339 # v0.41.0
    with:
      site-root: apps/site/dist
      build-command: bash scripts/ci/site/build.sh
      package-manager: bun
      node-version: '22'
      working-directory: apps/site
      bundle-manifest: .github/pages-bundle-manifest.json
      commit-sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      fallback-ref: main
      tooling-ref: 'b620af6996fc59f8de7fba1d451f76c67d788339' # v0.41.0
      build-job-name: Build site and bundle reports
      deploy-job-name: Deploy to GitHub Pages
      runner-image: ubuntu-24.04
      timeout-minutes: 20
