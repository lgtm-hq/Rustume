---
name: Deploy - GitHub Pages

"on":
  workflow_run:
    workflows:
      - Coverage Reports
      - Quality - Documentation Site
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: pages-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    # Pin commit SHA (not annotated tag object SHA) for reusable workflow resolution.
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-deploy-site-with-reports.yml@f96f88353ccf669dacb7c9e2bd3b5d4410d859fd # v0.24.0
    with:
      site-root: apps/site/dist
      build-command: bash scripts/ci/site/build.sh
      package-manager: bun
      node-version: '22'
      working-directory: apps/site
      bundle-manifest: .github/pages-bundle-manifest.json
      commit-sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      fallback-ref: main
      tooling-ref: f96f88353ccf669dacb7c9e2bd3b5d4410d859fd # v0.24.0
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        actions.githubusercontent.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        registry.npmjs.org:443
        bun.sh:443
      build-job-name: Build site and bundle reports
      deploy-job-name: Deploy to GitHub Pages
      runner-image: ubuntu-24.04
      timeout-minutes: 20
