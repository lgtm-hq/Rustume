---
name: Deploy - GitHub Pages

"on":
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'docs/**'
      - 'scripts/ci/site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pages:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-deploy-pages.yml@51c056cf62302e367c272f5ca8c49922709b2716 # v0.29.1
    with:
      build-command: bash scripts/ci/site/build.sh
      package-manager: bun
      source-path: apps/site/dist
      node-version: '22'
      working-directory: apps/site
