# SPDX-License-Identifier: AGPL-3.0-only
---
name: Deploy - GitHub Pages

"on":
  workflow_run:
    workflows:
      - Coverage Reports
      - Quality - Documentation Site
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    permissions:
      contents: read
      pages: write
      id-token: write
      # write (not read): v0.52.3 reusable build job declares actions: write
      # to prune stale Pages artifacts; a lower caller grant is a
      # startup_failure at workflow validation.
      actions: write
    # Pin commit SHA (not annotated tag object SHA) for reusable workflow resolution.
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-deploy-site-with-reports.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      # Explicit space-separated (folded scalar) allowlists: the reusable
      # workflow's newline block-scalar defaults are mis-parsed by the
      # harden-runner v2.20.0 agent (allowed-domains map keeps only the first
      # entry with port 0), so checkout to github.com is dropped (#439).
      # Values mirror the v0.52.3 reusable defaults for each job.
      allowed-endpoints-build: >-
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        registry.npmjs.org:443
        bun.sh:443
        cdn.playwright.dev:443
        playwright.azureedge.net:443
        playwright-akamai.azureedge.net:443
        archive.ubuntu.com:80
        security.ubuntu.com:80
      allowed-endpoints-deploy: >-
        github.com:443
        api.github.com:443
        actions.githubusercontent.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
      site-root: apps/site/dist
      build-command: bash scripts/ci/site/build.sh
      package-manager: bun
      node-version: '22'
      working-directory: apps/site
      bundle-manifest: .github/pages-bundle-manifest.json
      commit-sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      fallback-ref: main
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      build-job-name: Build site and bundle reports
      deploy-job-name: Deploy to GitHub Pages
      runner-image: ubuntu-24.04
      timeout-minutes: 20
