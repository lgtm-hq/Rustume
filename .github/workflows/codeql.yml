# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - CodeQL Code Scanning
# GitHub CodeQL static analysis for security vulnerabilities.

"on":
  push:
    branches: [main]
    paths: ["**.rs", "Cargo.toml", "Cargo.lock", ".github/**"]
  pull_request:
    branches: [main]
    paths: ["**.rs", "Cargo.toml", "Cargo.lock", ".github/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@b620af6996fc59f8de7fba1d451f76c67d788339 # v0.41.0
    with:
      tooling-ref: 'b620af6996fc59f8de7fba1d451f76c67d788339' # v0.41.0
      job-name: "🔬 CodeQL Analysis"
      languages: actions,rust
      language-build-modes: '{"rust":"autobuild","actions":"none"}'
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: append
      allowed-endpoints: |
        static.rust-lang.org:443
        sh.rustup.rs:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
    permissions:
      contents: read
      security-events: write
