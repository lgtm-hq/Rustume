# SPDX-License-Identifier: MIT
---
name: Security - CodeQL Code Scanning
# GitHub CodeQL static analysis for security vulnerabilities.
# Scans Rust and GitHub Actions code, uploads results to Security tab.
# Inline (not reusable-codeql): reusable passes build-mode to init, which fails
# when actions and rust are combined (actions does not support autobuild).

"on":
  push:
    branches: [main]
    paths: ["**.rs", "Cargo.toml", "Cargo.lock", ".github/**"]
  pull_request:
    branches: [main]
    paths: ["**.rs", "Cargo.toml", "Cargo.lock", ".github/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: 🔬 CodeQL Analysis
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            static.rust-lang.org:443
            sh.rustup.rs:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@0c9b946ff6bb93e3e67ce1d1f4a3c419266dc79e # v0.33.0

      - name: Initialize CodeQL
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: actions, rust

      - name: Autobuild
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4

      - name: Perform CodeQL Analysis
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: "/language:all"
