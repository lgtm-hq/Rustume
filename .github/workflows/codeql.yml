# SPDX-License-Identifier: AGPL-3.0-only
---
name: Security - CodeQL Code Scanning
# GitHub CodeQL static analysis for security vulnerabilities.

"on":
  push:
    branches: [main]
    paths: ["**.rs", "Cargo.toml", "Cargo.lock", ".github/**"]
  pull_request:
    branches: [main]
    paths: ["**.rs", "Cargo.toml", "Cargo.lock", ".github/**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@ba485556d3d4605b825347c2fe431ad4395b1c63 # v0.44.1
    with:
      tooling-ref: 'ba485556d3d4605b825347c2fe431ad4395b1c63' # v0.44.1
      job-name: "🔬 CodeQL Analysis"
      languages: actions,rust
      language-build-modes: '{"rust":"none","actions":"none"}'
      egress-policy: block
      egress-preset: quality
    permissions:
      contents: read
      security-events: write
