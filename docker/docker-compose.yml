---
services:
  rustume:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rustume:latest
    container_name: rustume-api
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - PORT=3000
    restart: unless-stopped
    # Distroless image has no shell or wget — disable container-local
    # healthcheck. Use Docker Desktop / external monitoring to probe
    # GET http://localhost:3000/health instead.
    healthcheck:
      disable: true
    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
