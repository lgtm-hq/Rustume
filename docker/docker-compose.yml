# Local development build — builds from source instead of pulling from GHCR.
# For the published-image version, use the root docker-compose.yml.
---
services:
  rustume:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rustume:local
    container_name: rustume-dev
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: debug
      PORT: "3000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/rustume-server", "--health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
