# --- npm: transitive via @astrojs/check -> yaml-language-server ---

# Removed GHSA-48c2-rrv3-qjmp suppression: bun overrides force yaml >= 2.8.3

# --- npm: license metadata missing from bun.lock / GitHub Actions pins ---

[[PackageOverrides]]
