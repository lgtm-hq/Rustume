---
# Lintro Configuration for Rustume
# https://github.com/lgtm-hq/py-lintro
#
# Lintro is the master configuration source for all tools.
# Native tool configs are used when available.

enforce:
  line_length: 100

execution:
  enabled_tools: []
  tool_order: "priority"
  fail_fast: false
  parallel: true
  max_workers: 10

# Fallback configurations for tools without native config files.
# These are used when no native config is found.
defaults:
  markdownlint:
    MD013:
      line_length: 100
      code_blocks: false
      tables: false

  yamllint:
    extends: "default"
    rules:
      comments-indentation: "disable"
      comments:
        min-spaces-from-content: 1
      truthy:
        check-keys: true
      line-length:
        max: 100
        allow-non-breakable-inline-mappings: true

  hadolint:
    trusted_registries:
      - "docker.io"
      - "gcr.io"
      - "ghcr.io"

# Tool enable/disable settings.
tools:
  # tsc: disabled — plain tsc cannot resolve Astro virtual modules (astro:content).
  # Type-check the docs site via scripts/ci/site/check.sh instead.
  # See lgtm-hq/py-lintro#803 for monorepo tsc limitations.
  tsc:
    enabled: false

  astro-check:
    enabled: false
    # Type-check via scripts/ci/site/check.sh (site-quality CI + make site-test).
    # Direct `bun run check` in apps/site is reliable; lintro's astro-check wrapper
    # can hang on bunx when run in parallel or before deps are installed.

# All tools auto-detected and enabled by default.
